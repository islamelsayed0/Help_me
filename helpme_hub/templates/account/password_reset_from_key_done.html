{% extends 'base.html' %}
{% load i18n %}

{% block title %}Password Changed - HelpMe Hub{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-light-card dark:bg-dark-card rounded-lg p-8 border border-[rgba(15,23,42,0.10)] dark:border-[rgba(148,163,184,0.15)] transition-colors light-card-shadow">
        <div class="text-center mb-8">
            <div class="mb-4">
                <svg class="mx-auto h-16 w-16 text-green-500 dark:text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-text-primary-light dark:text-text-primary-dark mb-2">Password Changed</h1>
            <p class="text-text-secondary-light dark:text-text-secondary-dark">Your password has been successfully changed</p>
        </div>
        
        <div class="space-y-4">
            <div class="p-4 bg-light-card-hover dark:bg-dark-card-hover rounded-md border border-[rgba(15,23,42,0.10)] dark:border-[rgba(148,163,184,0.15)]">
                <p class="text-text-primary-light dark:text-text-primary-dark text-sm text-center">
                    Your password is now changed. You can now sign in with your new password.
                </p>
            </div>
            
            <div class="mt-6 text-center">
                <a href="{% url 'accounts:login' %}" class="inline-block bg-light-blue dark:bg-calm-blue hover:bg-light-blue-hover dark:hover:bg-calm-blue-hover active:bg-light-blue-active active:dark:bg-calm-blue-active text-white font-medium py-2 px-6 rounded-md transition-colors">
                    Sign In Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
